<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 4 - Atributo dos Inputs</title>
    <link rel="stylesheet" href="aulaQuatro.css">
</head>
<body>
    <header>
        <section class="secao-topo">
            <h2>Faculdade</h2>
        </section>
    </header>
    <main>
        <section class="secao-conteudo">
            <div class="limitaConteudo">
                <h1>Matrícula</h1>
                <p>Preencha os campos abaixo para cria sua matrícula e 
                    seu cadastro no ambiente virtual da Faculdade.
                </p>
                <form action="https://www.devmedia.com.br/codigos/formularios/aula3/">
                    <label>Nome</label>
                    <input type="text" name="nome" placeholder="Digite o nome completo" required>
                    <label>Data de Nascimento</label>
                    <input type="date" name="data_nascimento" max="2008-01-07" required>
                    <label>Email</label>
                    <input type="email" name="email" placeholder="exemplo@provedor.com">
                    <label>Telefone</label>
                    <input type="tel" name="telefone" placeholder="(XX)XXXXX-XXXX" minlength="11" required>
                    <label>Melhor dia para vencimento</label>
                    <input type="number" name="dia_vencimento" min="10" max="20" required>
                    <label>Login</label>
                    <input type="text" name="login" minlength="3" required>
                    <label>Senha</label>
                    <input type="password" name="senha" minlength="4" maxlength="8" required>
                    <button type="submit">Enviar Matrícula</button>
                </form>                
            </div>            
        </section>
    </main>
    <footer>
        <section class="secao-rodape">
            <p>Copyright 2026 - Faculdade</p>
        </section>
    </footer>    
</body>
</html>
