<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 3 - Input</title>
    <link rel="stylesheet" href="aulaTres.css">
</head>
<body>
    <header>
        <section class="secao-topo">
            <h2>Faculdade</h2>
        </section>
    </header>
    <main>
        <section class="secao-conteudo">
            <div class="limitaConteudo">
                <h1>Matrícula</h1>
                <p>Preencha os campos abaixo para cria sua matrícula e 
                    seu cadastro no ambiente virtual da Faculdade.
                </p>
                <form action="https://www.devmedia.com.br/codigos/formularios/aula3/">
                    <label>Nome</label>
                    <input type="text" name="nome">
                    <label>Data de Nascimento</label>
                    <input type="date" name="data_nascimento">
                    <label>Email</label>
                    <input type="email" name="email">
                    <label>Telefone</label>
                    <input type="tel" name="telefone">
                    <label>Melhor dia para vencimento</label>
                    <input type="number" name="dia_vencimento">
                    <label>Login</label>
                    <input type="text" name="login">
                    <label>Senha</label>
                    <input type="password" name="senha">
                    <button type="submit">Enviar Matrícula</button>
                </form>                
            </div>            
        </section>
    </main>
    <footer>
        <section class="secao-rodape">
            <p>Copyright 2026 - Faculdade</p>
        </section>
    </footer>    
</body>
</html>
